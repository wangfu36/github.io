<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>22.Do 临时邮箱池 · 实时取号 + 收件箱</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            background: #f1f5f9;
            margin: 0;
            min-height: 100vh;
            padding: 24px 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
        .card {
            background: white;
            border-radius: 1.8rem;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 1.6rem 1.8rem 2rem;
        }
        .email-panel { text-align: center; }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            margin: 0 0 0.2rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1::before { content: "📧"; font-size: 1.8rem; }
        .sub { color: #475569; margin-bottom: 1.2rem; font-size: 0.85rem; border-bottom: 1px solid #e2e8f0; display: inline-block; padding-bottom: 6px; }
        #emailDisplay {
            background: #f8fafc;
            font-size: 1.4rem;
            font-weight: 600;
            font-family: monospace;
            margin: 1rem 0;
            padding: 1rem 1.2rem;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            width: 100%;
            word-break: break-all;
            background: white;
        }
        .button-group { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; margin: 12px 0 8px; }
        button {
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 24px;
            cursor: pointer;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 60px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        button:active { transform: scale(0.97); }
        button:disabled { background: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        .btn-secondary { background: #3b82f6; }
        .btn-outline { background: white; color: #1e293b; border: 1px solid #cbd5e1; }
        #msg {
            margin-top: 16px;
            font-size: 0.85rem;
            background: #eef2ff;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
        }
        .inbox-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; margin-bottom: 1.2rem; border-bottom: 2px solid #eef2ff; padding-bottom: 0.75rem; }
        .inbox-title { font-size: 1.4rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .inbox-actions { display: flex; gap: 12px; }
        .refresh-btn { background: #f1f5f9; color: #1e293b; padding: 8px 16px; font-size: 0.8rem; }
        .auto-badge { background: #e6f7ec; font-size: 0.7rem; padding: 4px 12px; border-radius: 30px; }
        .email-list { max-height: 460px; overflow-y: auto; border-radius: 1rem; }
        .email-item {
            background: #fefefe;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 12px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .email-subject { font-weight: 600; color: #0f172a; }
        .email-from { font-size: 0.75rem; color: #475569; margin-top: 4px; }
        .email-time { font-size: 0.7rem; color: #64748b; white-space: nowrap; }
        .detail-btn { background: #eef2ff; padding: 6px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: 500; color: #2563eb; cursor: pointer; border: none; }
        .empty-inbox { text-align: center; padding: 48px 20px; background: #fafcff; border-radius: 1.5rem; color: #64748b; }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-card {
            background: white;
            max-width: 90%;
            width: 540px;
            border-radius: 2rem;
            padding: 1.6rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .message-body { margin-top: 16px; white-space: pre-wrap; background: #f8fafc; padding: 12px; border-radius: 20px; font-size: 0.85rem; }
        hr { margin: 1rem 0; border: none; border-top: 1px solid #e2e8f0; }
        footer { font-size: 0.7rem; text-align: center; color: #6c7a91; margin-top: 12px; }
        @media (max-width: 640px) {
            .card { padding: 1.2rem; }
            #emailDisplay { font-size: 1rem; }
            button { padding: 10px 18px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card email-panel">
        <h1>22.Do 临时邮箱池</h1>
        <div class="sub">✨ 实时生成 · 别名机制 · 即取即用 ✨</div>
        <div id="emailDisplay">⚡ 连接代理中...</div>
        <div class="button-group">
            <button id="newEmailBtn">🔄 获取新邮箱 & 复制</button>
            <button id="copyCurrentBtn" class="btn-outline">📋 复制当前邮箱</button>
        </div>
        <div id="msg">💡 每次点击都会创建全新地址（支持别名，永不重复）</div>
    </div>

    <div class="card">
        <div class="inbox-header">
            <div class="inbox-title">
                📥 当前邮箱收件箱
                <span class="auto-badge" id="autoRefreshBadge">⚡ 自动刷新中(10s)</span>
            </div>
            <div class="inbox-actions">
                <button id="manualRefreshBtn" class="refresh-btn">🔄 手动刷新</button>
                <button id="toggleAutoRefreshBtn" class="refresh-btn">⏸️ 暂停自动</button>
            </div>
        </div>
        <div id="inboxContainer">
            <div class="empty-inbox">👈 请先点击「获取新邮箱」</div>
        </div>
        <footer>📬 点击任意邮件可查看完整内容 | 新邮件自动轮询同步</footer>
    </div>
</div>

<div id="messageModal" class="modal">
    <div class="modal-card">
        <button class="modal-close" id="closeModalBtn">&times;</button>
        <h3 id="modalSubject">邮件主题</h3>
        <div><strong>发件人：</strong> <span id="modalFrom"></span></div>
        <div><strong>收件人：</strong> <span id="modalTo"></span></div>
        <div><strong>时间：</strong> <span id="modalTime"></span></div>
        <hr>
        <div class="message-body" id="modalBody">加载中...</div>
    </div>
</div>

<script>
    // ==================== 只需要修改这一个地方 ====================
    const WORKER_URL = 'https://worker-square-feather-bcda.pangdonglai88.workers.dev/';  // 替换成你的 Worker 地址
    // ============================================================

    let currentEmail = '';
    let autoRefreshInterval = null;
    let autoRefreshEnabled = true;
    let currentMailList = [];

    // DOM 元素
    const emailDisplayDiv = document.getElementById('emailDisplay');
    const newEmailBtn = document.getElementById('newEmailBtn');
    const copyCurrentBtn = document.getElementById('copyCurrentBtn');
    const msgDiv = document.getElementById('msg');
    const inboxContainer = document.getElementById('inboxContainer');
    const manualRefreshBtn = document.getElementById('manualRefreshBtn');
    const toggleAutoBtn = document.getElementById('toggleAutoRefreshBtn');
    const autoBadge = document.getElementById('autoRefreshBadge');

    const modal = document.getElementById('messageModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const modalSubject = document.getElementById('modalSubject');
    const modalFrom = document.getElementById('modalFrom');
    const modalTo = document.getElementById('modalTo');
    const modalTime = document.getElementById('modalTime');
    const modalBody = document.getElementById('modalBody');

    function setMessage(text, isError = false) {
        msgDiv.textContent = text;
        msgDiv.style.backgroundColor = isError ? '#ffe4e2' : '#e6f7ec';
        msgDiv.style.color = isError ? '#b91c1c' : '#166534';
        setTimeout(() => {
            if (msgDiv.textContent === text && !isError) {
                msgDiv.textContent = '✅ 就绪，可随时领取新邮箱';
                msgDiv.style.backgroundColor = '#eef2ff';
                msgDiv.style.color = '#2c3e66';
            }
        }, 3000);
    }

    async function copyToClipboard(text) {
        if (!text) return false;
        try {
            await navigator.clipboard.writeText(text);
            return true;
        } catch {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.top = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            const ok = document.execCommand('copy');
            document.body.removeChild(ta);
            return ok;
        }
    }

    // 通用请求函数（通过 Worker 代理）
    async function apiRequest(path, body = {}) {
        const response = await fetch(WORKER_URL + path, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok || data.code !== 200) {
            throw new Error(data.msg || `请求失败 (${response.status})`);
        }
        return data;
    }

    async function fetchNewEmail() {
        setMessage('🔄 正在创建全新临时邮箱...', false);
        const result = await apiRequest('/account/private', {});
        const email = result.data?.email;
        if (!email) throw new Error('返回数据无邮箱地址');
        return email;
    }

    async function fetchInbox(email) {
        if (!email) return [];
        const result = await apiRequest('/inbox', { email, time: null });
        let messages = result.data || [];
        if (!Array.isArray(messages)) messages = [];
        messages.sort((a,b) => (b.time || 0) - (a.time || 0));
        return messages;
    }

    async function fetchMessageDetail(messageId) {
        const result = await apiRequest('/inbox/message', { messageId });
        return result.data;
    }

    function renderInbox(messages) {
        if (!messages || messages.length === 0) {
            inboxContainer.innerHTML = `<div class="empty-inbox">📭 暂无邮件，等待新邮件到达将自动显示</div>`;
            return;
        }
        const html = messages.map(msg => {
            const timeStr = msg.time ? new Date(msg.time * 1000).toLocaleString() : '未知时间';
            const subject = msg.subject || '(无主题)';
            const from = msg.from || '未知发件人';
            return `
                <div class="email-item" data-message-id="${msg.messageId}">
                    <div class="email-info">
                        <div class="email-subject">${escapeHtml(subject)}</div>
                        <div class="email-from">📨 ${escapeHtml(from)}</div>
                    </div>
                    <div class="email-time">${escapeHtml(timeStr)}</div>
                    <button class="detail-btn" data-id="${msg.messageId}">查看详情</button>
                </div>
            `;
        }).join('');
        inboxContainer.innerHTML = html;
        document.querySelectorAll('.detail-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const messageId = btn.getAttribute('data-id');
                if (messageId) await showMessageDetail(messageId);
            });
        });
    }

    async function showMessageDetail(messageId) {
        try {
            modal.style.display = 'flex';
            modalSubject.innerText = '加载中...';
            const detail = await fetchMessageDetail(messageId);
            modalSubject.innerText = detail.subject || '(无主题)';
            modalFrom.innerText = detail.from || '未知';
            modalTo.innerText = detail.to || (detail.tos ? detail.tos.join(', ') : '未知');
            const timeStr = detail.time ? new Date(detail.time * 1000).toLocaleString() : '未知';
            modalTime.innerText = timeStr;
            let bodyContent = detail.body || detail.html || '无正文内容';
            if (detail.html && !detail.body) {
                const div = document.createElement('div');
                div.innerHTML = detail.html;
                bodyContent = div.innerText || detail.html;
            }
            modalBody.innerText = bodyContent;
        } catch (err) {
            modalBody.innerText = `加载失败: ${err.message}`;
        }
    }

    async function refreshInbox() {
        if (!currentEmail) {
            inboxContainer.innerHTML = `<div class="empty-inbox">📭 尚未选择邮箱，请先获取新邮箱</div>`;
            return;
        }
        try {
            const messages = await fetchInbox(currentEmail);
            currentMailList = messages;
            renderInbox(messages);
        } catch (err) {
            inboxContainer.innerHTML = `<div class="empty-inbox">⚠️ 收件箱加载失败: ${err.message}</div>`;
        }
    }

    async function switchToNewEmail() {
        newEmailBtn.disabled = true;
        const originalText = newEmailBtn.innerText;
        newEmailBtn.innerText = '⏳ 生成中...';
        try {
            const newMail = await fetchNewEmail();
            currentEmail = newMail;
            emailDisplayDiv.textContent = currentEmail;
            const copyOk = await copyToClipboard(currentEmail);
            if (copyOk) setMessage(`🎉 新邮箱已复制: ${currentEmail}`, false);
            else setMessage(`⚠️ 新邮箱已生成，但复制失败`, false);
            await refreshInbox();
            resetAutoRefresh();
        } catch (err) {
            setMessage(`❌ 获取邮箱失败: ${err.message}`, true);
            emailDisplayDiv.textContent = '⚠️ 获取失败，请重试';
        } finally {
            newEmailBtn.disabled = false;
            newEmailBtn.innerText = originalText;
            copyCurrentBtn.disabled = !currentEmail;
        }
    }

    async function handleCopyCurrent() {
        if (!currentEmail) {
            setMessage('没有可复制的邮箱，请先获取新邮箱', true);
            return;
        }
        const ok = await copyToClipboard(currentEmail);
        if (ok) setMessage(`📋 已复制: ${currentEmail}`, false);
        else setMessage('复制失败', true);
    }

    function startAutoRefresh() {
        if (autoRefreshInterval) clearInterval(autoRefreshInterval);
        if (!autoRefreshEnabled) return;
        autoRefreshInterval = setInterval(async () => {
            if (currentEmail && autoRefreshEnabled) await refreshInbox();
        }, 10000);
        autoBadge.innerText = '⚡ 自动刷新中(10s)';
        autoBadge.style.background = '#e6f7ec';
    }

    function stopAutoRefresh() {
        if (autoRefreshInterval) {
            clearInterval(autoRefreshInterval);
            autoRefreshInterval = null;
        }
        autoBadge.innerText = '⏸️ 自动已暂停';
        autoBadge.style.background = '#f1f5f9';
    }

    function resetAutoRefresh() {
        if (autoRefreshEnabled) {
            stopAutoRefresh();
            startAutoRefresh();
        }
    }

    function toggleAutoRefresh() {
        autoRefreshEnabled = !autoRefreshEnabled;
        if (autoRefreshEnabled) {
            startAutoRefresh();
            toggleAutoBtn.innerHTML = '⏸️ 暂停自动';
            setMessage('已开启自动刷新收件箱 (10秒)', false);
        } else {
            stopAutoRefresh();
            toggleAutoBtn.innerHTML = '▶️ 开启自动';
            setMessage('已关闭自动刷新', false);
        }
    }

    async function manualRefresh() {
        if (!currentEmail) {
            setMessage('没有可用邮箱，请先获取邮箱', true);
            return;
        }
        setMessage('🔄 手动刷新收件箱...', false);
        await refreshInbox();
        setMessage('✅ 收件箱已更新', false);
    }

    function closeModal() { modal.style.display = 'none'; }

    async function init() {
        // 测试代理连通性（随便发一个请求测试，例如尝试获取第一个邮箱）
        try {
            await switchToNewEmail();
        } catch (err) {
            emailDisplayDiv.textContent = '❌ 代理连接失败，请检查 Worker 地址';
            setMessage(`初始化失败: ${err.message}`, true);
            newEmailBtn.disabled = false;
        }
        autoRefreshEnabled = true;
        startAutoRefresh();
    }

    // 事件绑定
    newEmailBtn.addEventListener('click', switchToNewEmail);
    copyCurrentBtn.addEventListener('click', handleCopyCurrent);
    manualRefreshBtn.addEventListener('click', manualRefresh);
    toggleAutoBtn.addEventListener('click', toggleAutoRefresh);
    window.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    closeModalBtn.addEventListener('click', closeModal);
    window.addEventListener('beforeunload', () => { if (autoRefreshInterval) clearInterval(autoRefreshInterval); });

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    init();
</script>
</body>
</html>
